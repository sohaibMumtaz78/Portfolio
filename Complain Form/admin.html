<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - CMS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

    <header class="main-header">
        <div class="header-content">
            <h1>🛡️ Admin Control</h1>
            <nav>
                <a href="login.html" class="btn-logout" style="text-decoration: none; font-size: 14px;">Exit Panel</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="card" id="loginBox">
            <div class="header">
                <div class="logo">🔐</div>
                <h2>Restricted Access</h2>
                <p>Enter administrator password to continue</p>
            </div>
            
            <div class="form-group">
                <label>Admin Password</label>
                <input type="password" id="adminPassword" placeholder="••••••••">
            </div>
            <button class="btn-login" id="loginBtn">Verify & Access</button>
        </div>

        <div class="card admin-panel-wide" id="adminPanel" style="display:none;">
            <div class="list-header" style="margin-bottom: 20px;">
                <h2 id="Received-complaint">Received Complaints</h2>
                <p>Total complaints registered by users</p>
            </div>
            
            <div class="table-responsive">
                <ul id="adminComplaintList" class="styled-list">
                    </ul>
            </div>
        </div>
    </div>

</body>
<script src="admin.js"></script>
</html>
